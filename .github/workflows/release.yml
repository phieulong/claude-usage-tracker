name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binaries
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Create .app bundle (universal)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="dist/Claude Usage Tracker.app"
          
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          
          # Universal binary
          lipo -create \
            target/aarch64-apple-darwin/release/claude-usage-tracker \
            target/x86_64-apple-darwin/release/claude-usage-tracker \
            -output "$APP_DIR/Contents/MacOS/claude-usage-tracker"
          chmod +x "$APP_DIR/Contents/MacOS/claude-usage-tracker"
          
          # Info.plist with correct version
          sed "s/<string>1.0.0<\/string>/<string>$VERSION<\/string>/g" \
            Info.plist > "$APP_DIR/Contents/Info.plist"
          
          # Icon
          if command -v sips &>/dev/null && [ -f claude_ai_icon.jpg ]; then
            ICONSET="dist/AppIcon.iconset"
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size claude_ai_icon.jpg \
                  --out "$ICONSET/icon_${size}x${size}.png" &>/dev/null
              sips -z $((size*2)) $((size*2)) claude_ai_icon.jpg \
                  --out "$ICONSET/icon_${size}x${size}@2x.png" &>/dev/null
            done
            iconutil -c icns "$ICONSET" \
              -o "$APP_DIR/Contents/Resources/AppIcon.icns" 2>/dev/null || true
          fi
          
          cp com.user.claude-usage-tracker.plist "$APP_DIR/Contents/Resources/"

      - name: Create Homebrew tarballs & zip
        id: archives
        run: |
          cd dist
          
          # .app bundle zip
          zip -r claude-usage-tracker-universal-apple-darwin.zip "Claude Usage Tracker.app" --quiet
          
          # arm64 tarball
          mkdir pkg-arm64
          cp ../target/aarch64-apple-darwin/release/claude-usage-tracker pkg-arm64/
          cp ../com.user.claude-usage-tracker.plist pkg-arm64/
          tar czf claude-usage-tracker-aarch64-apple-darwin.tar.gz -C pkg-arm64 .
          
          # x86_64 tarball
          mkdir pkg-x86_64
          cp ../target/x86_64-apple-darwin/release/claude-usage-tracker pkg-x86_64/
          cp ../com.user.claude-usage-tracker.plist pkg-x86_64/
          tar czf claude-usage-tracker-x86_64-apple-darwin.tar.gz -C pkg-x86_64 .
          
          # SHA256 outputs
          ARM_SHA=$(shasum -a 256 claude-usage-tracker-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          INTEL_SHA=$(shasum -a 256 claude-usage-tracker-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          echo "arm_sha=$ARM_SHA"   >> $GITHUB_OUTPUT
          echo "intel_sha=$INTEL_SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/claude-usage-tracker-universal-apple-darwin.zip
            dist/claude-usage-tracker-aarch64-apple-darwin.tar.gz
            dist/claude-usage-tracker-x86_64-apple-darwin.tar.gz

      - name: Update Homebrew tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.archives.outputs.arm_sha }}
          INTEL_SHA: ${{ steps.archives.outputs.intel_sha }}
        run: |
          VER="${VERSION#v}"
          REPO="https://github.com/phieulong/claude-usage-tracker"
          
          cat > /tmp/claude-usage-tracker.rb << FORMULA
          class ClaudeUsageTracker < Formula
            desc "macOS menu bar app tracking Claude AI session + weekly token usage"
            homepage "$REPO"
            version "$VER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$REPO/releases/download/${VERSION}/claude-usage-tracker-aarch64-apple-darwin.tar.gz"
                sha256 "$ARM_SHA"
              else
                url "$REPO/releases/download/${VERSION}/claude-usage-tracker-x86_64-apple-darwin.tar.gz"
                sha256 "$INTEL_SHA"
              end
            end

            def install
              bin.install "claude-usage-tracker"
              (prefix/"LaunchAgents").install "com.user.claude-usage-tracker.plist"
            end

            service do
              run [opt_bin/"claude-usage-tracker", "daemon"]
              keep_alive true
              log_path "/tmp/claude-usage-tracker.log"
              error_log_path "/tmp/claude-usage-tracker.err"
              environment_variables RUST_LOG: "info"
            end

            def caveats
              <<~EOS
                Claude Usage Tracker là menu bar app — chạy ẩn, không có cửa sổ.

                Khởi động tự động khi login:
                  brew services start claude-usage-tracker

                Dừng:
                  brew services stop claude-usage-tracker
              EOS
            end

            test do
              assert_match "claude-usage-tracker", shell_output("#{bin}/claude-usage-tracker --help 2>&1")
            end
          end
          FORMULA
          
          # Push sang homebrew-tap repo
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/phieulong/homebrew-tap.git" \
            /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          cp /tmp/claude-usage-tracker.rb /tmp/homebrew-tap/Formula/claude-usage-tracker.rb
          cd /tmp/homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add Formula/claude-usage-tracker.rb
          git diff --cached --quiet || git commit -m "claude-usage-tracker ${VERSION}"
          git push

